<!DOCTYPE html>
<html>
<head>
  <title>Contact Us Form</title>
</head>
<body>

  <h1>Contact Us Form</h1>

  <input id="contactId" placeholder="Contact ID"><br><br>
  <input id="name" placeholder="Name"><br><br>
  <input id="email" placeholder="Email"><br><br>
  <input id="phone" placeholder="Phone"><br><br>
  <input id="address" placeholder="Address"><br><br>
  <input id="city" placeholder="City"><br><br>
  <input id="country" placeholder="Country"><br><br>
  <input id="subject" placeholder="Subject"><br><br>
  <input id="message" placeholder="Message"><br><br>
  <input id="date" type="date"><br><br>

  <button onclick="addContact()">Add</button>
  <button onclick="readContact()">Fetch/Read</button>
  <button onclick="updateContact()">Update</button>
  <button onclick="deleteContact()">Delete</button>

  <p id="result"></p>

  <script type="module" src="script.js"></script>
</body>
</html>
<!-- Firebase Realtime Database Contact Management System -->
